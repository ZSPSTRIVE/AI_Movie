server:
  port: 9201

spring:
  application:
    name: jelly-film
  profiles:
    active: dev
  config:
    import: optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        register-enabled: true
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yml
        import-check:
          enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/jelly_cinema?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0

# Elasticsearch
elasticsearch:
  host: ${ES_HOST:localhost}
  port: ${ES_PORT:9200}
  scheme: http

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.jelly.cinema.film.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-header: true
  is-read-cookie: false

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.jelly.cinema: info

tvbox:
  proxy:
    base-url: ${TVBOX_PROXY_BASE_URL:http://localhost:3001/api/tvbox}
  startup-sync:
    enabled: ${TVBOX_STARTUP_SYNC_ENABLED:true}
    delay-ms: ${TVBOX_STARTUP_SYNC_DELAY_MS:5000}
    initial-target: ${TVBOX_STARTUP_INITIAL_TARGET:2000}
    incremental-target: ${TVBOX_STARTUP_INCREMENTAL_TARGET:100}
    recommend-limit: ${TVBOX_STARTUP_RECOMMEND_LIMIT:100}
    list-page-size: ${TVBOX_STARTUP_LIST_PAGE_SIZE:100}
    max-list-pages: ${TVBOX_STARTUP_MAX_LIST_PAGES:20}
    search-limit: ${TVBOX_STARTUP_SEARCH_LIMIT:20}
    play-url-prefetch-limit: ${TVBOX_STARTUP_PLAY_PREFETCH_LIMIT:30}
    search-keywords: ${TVBOX_STARTUP_SEARCH_KEYWORDS:电影,喜剧,电视剧,动漫,科幻,动作,爱情,悬疑,冒险,战争,综艺,纪录片,少儿,经典,高分,轻松,休闲,下饭,治愈,热血}

# 禁用 Elasticsearch 健康检查
management:
  health:
    elasticsearch:
      enabled: false
